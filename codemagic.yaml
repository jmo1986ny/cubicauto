workflows:
  android-debug-build:
    name: CubicAuto Debug APK
    max_build_duration: 30
    environment:
      java: 17
      vars:
        PACKAGE_NAME: "com.cubicauto"

    scripts:
      - name: Accept Android SDK licenses
        script: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Download Gradle wrapper jar
        script: |
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          ls -lh gradle/wrapper/

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Build debug APK
        script: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            2>&1 | tee build_full.log
          # Print just Kotlin errors so they're visible in Codemagic log
          echo "=== KOTLIN ERRORS ==="
          grep -E "error:|warning:|\.kt:[0-9]+" build_full.log | head -80 || true
          echo "=== END ERRORS ==="
          # Fail if build failed
          grep -q "BUILD SUCCESSFUL" build_full.log || exit 1

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/logs/**
      - build_full.log

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com
        notify:
          success: true
          failure: true
